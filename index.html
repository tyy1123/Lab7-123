<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>美丽烟台理工校园 | 田玉颖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "微软雅黑", sans-serif;
            background-color: #fef4f8;
            padding-bottom: 80px;
        }
        h1 {
            text-align: center;
            color: #d63384;
            margin: 30px 0;
            letter-spacing: 2px;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            transition: transform 0.4s ease;
            font-size: 22px;
        }
        h2:hover {
            transform: rotate(45deg);
        }

        .box {
            width: 280px;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            background: #fff;
            position: relative;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }
        .img-title {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.4);
            color: #fff;
            text-align: center;
            padding: 6px 0;
            font-size: 14px;
        }

        .theme1 {
            width: 900px;
            margin: 0 auto 60px;
        }
        .theme1 h2 {color: #3498db;}
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }
        .grid .box:nth-child(1):hover img,
        .grid .box:nth-child(2):hover img,
        .grid .box:nth-child(3):hover img {
            transform: scale(1.5);
        }
        .grid .box:nth-child(4):hover img,
        .grid .box:nth-child(5):hover img,
        .grid .box:nth-child(6):hover img {
            transform: skewX(30deg);
        }

        .theme2 {
            width: 900px;
            height: 680px;
            margin: 0 auto 60px;
            position: relative;
        }
        .theme2 h2 {
            color: #e74c3c;
        }
        .theme2 .box {
            position: absolute;
        }
        .theme2 .box:nth-child(2) { top: 60px; left: 0;     }
        .theme2 .box:nth-child(3) { top: 60px; left: 306px; }
        .theme2 .box:nth-child(4) { top: 60px; left: 612px; }

        .theme2 .box:nth-child(5) { top: 276px; left: 0;     }
        .theme2 .box:nth-child(6) { top: 276px; left: 306px; }
        .theme2 .box:nth-child(7) { top: 276px; left: 612px; }

        .theme2 .box:nth-child(8)  { top: 492px; left: 0;     }
        .theme2 .box:nth-child(9)  { top: 492px; left: 306px; }
        .theme2 .box:nth-child(10) { top: 492px; left: 612px; }

        .theme2 .box:nth-child(2):hover img,
        .theme2 .box:nth-child(3):hover img,
        .theme2 .box:nth-child(4):hover img {
            transform: scale(1.5);
        }
        .theme2 .box:nth-child(5):hover img,
        .theme2 .box:nth-child(6):hover img,
        .theme2 .box:nth-child(7):hover img {
            transform: skewX(30deg);
        }

        .theme3 {
            width: 900px;
            margin: 0 auto 80px;
        }
        .theme3 h2 {color: #27ae60;}
        .theme3 .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }
        .theme3 .box:nth-child(1):hover img,
        .theme3 .box:nth-child(2):hover img,
        .theme3 .box:nth-child(3):hover img {
            transform: scale(1.5);
        }
        .theme3 .box:nth-child(4):hover img,
        .theme3 .box:nth-child(5):hover img,
        .theme3 .box:nth-child(6):hover img {
            transform: skewX(30deg);
        }

        footer {
            width: 100%;
            height: 55px;
            background-color: #2c3e50;
            color: #fff;
            text-align: center;
            line-height: 55px;
            position: fixed;
            bottom: 0;
            left: 0;
            font-size: 15px;
        }
    </style>
</head>
<body>
